name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump:
    name: Bump & tag
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Bump version in all package.json files
        id: bump
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEW="$MAJOR.$MINOR.$PATCH"
          echo "NEW_VERSION=$NEW" >> $GITHUB_ENV

          # Update root package.json
          node -e "
            const fs = require('fs');
            const j = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            j.version = '$NEW';
            for (const k of Object.keys(j.optionalDependencies || {})) {
              j.optionalDependencies[k] = '$NEW';
            }
            fs.writeFileSync('package.json', JSON.stringify(j, null, 2) + '\n');
          "

          # Update platform packages
          for pkg in packages/*/; do
            node -e "
              const fs = require('fs');
              const p = '${pkg}package.json';
              const j = JSON.parse(fs.readFileSync(p, 'utf8'));
              j.version = '$NEW';
              fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
            "
          done

          echo "Bumped $CURRENT → $NEW"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json packages/*/package.json
          git commit -m "chore: bump version to $NEW_VERSION"
          git tag "v$NEW_VERSION"
          git push origin HEAD --tags
