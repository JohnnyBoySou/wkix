name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
      - "[0-9]*"

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Set version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
            VERSION=${TAG#v}
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Publish platform packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          ROOT=$(pwd)
          for pkg in wkix-linux-x64 wkix-darwin-x64 wkix-darwin-arm64 wkix-win32-x64; do
            node -e "
              const fs = require('fs');
              const p = '$ROOT/packages/$pkg/package.json';
              const j = JSON.parse(fs.readFileSync(p, 'utf8'));
              j.version = process.env.VERSION;
              fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
            "
            npm publish "$ROOT/packages/$pkg" --access public
          done

      - name: Update optionalDependencies and publish main package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          node -e "
            const fs = require('fs');
            const j = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            j.version = process.env.VERSION;
            for (const k of Object.keys(j.optionalDependencies)) {
              j.optionalDependencies[k] = process.env.VERSION;
            }
            fs.writeFileSync('package.json', JSON.stringify(j, null, 2) + '\n');
          "
          npm publish --access public
